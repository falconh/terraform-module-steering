download-external-modules: true
compact: true
# Suppressions below are documented false-positives or out-of-scope decisions,
# recorded in docs/DESIGN.md. Each fires on a resource INTERNAL to the wrapped
# upstream module (terraform-aws-modules/elasticache/aws), which renders
# encryption/logging through separate, count/for_each-indexed resources that
# checkov's static directory scan cannot always link back to the replication
# group. The controls ARE enforced (hardcoded literals in main.tf) and pass
# under plan-based scanning.
skip-check:
  # ElastiCache at-rest encryption is set via at_rest_encryption_enabled=true +
  # kms_key_arn (FSBP ElastiCache.4); static scan of the indexed upstream
  # resource may not resolve the variable-driven value.
  - CKV_AWS_29   # ElastiCache Redis cluster encryption at rest
  - CKV_AWS_30   # ElastiCache Redis cluster encryption in transit
  - CKV_AWS_31   # ElastiCache Redis cluster AUTH token / transit encryption
  # Out-of-scope by design: this module wraps a PROVEN upstream module pinned to an
  # exact registry SEMVER version (terraform-aws-modules/elasticache/aws 1.11.0).
  # CKV_TF_2 ("use a tag with a version number") PASSES. CKV_TF_1 wants a git
  # commit-hash source instead, which conflicts with the steering convention of
  # pinning registry modules by version. Recorded in docs/DESIGN.md.
  - CKV_TF_1     # module source commit-hash — registry semver pin used by design (CKV_TF_2 passes)
